main:
  push:
    - services:
        - docker
      imports:
        - https://cnb.cool/IIIStudio/key/-/blob/main/github/env.yml
      stages:
        - name: 同步到GitHub
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/IIIStudio/IIINavbar.git  # GitHub仓库URL
            auth_type: https             # HTTPS认证（推荐）
            username: ${GIT_USERNAME} 
            password: ${GIT_ACCESS_TOKEN} # 从密钥库env.yml获取的令牌
            branch: main                 # 目标分支
            force: false                 # 暂时不用强制推送
            push_tags: false             # 暂时不推送标签
            sync_mode: rebase