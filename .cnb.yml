main:
  push:
    - services:
        - docker
      imports:
        - https://cnb.cool/IIIStudio/key/-/blob/main/github/env.yml
      stages:
        - name: 配置Git用户信息
          image: alpine/git
          commands:
            - git config --global user.name "IIIStudio"
            - git config --global user.email "IIIStudio@qq.com"
        - name: 同步到GitHub
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/IIIStudio/IIINavbar.git
            auth_type: https
            username: ${GIT_USERNAME} 
            password: ${GIT_ACCESS_TOKEN}
            branch: main
            force: true                   # true，强制推送
            push_tags: false              # 暂时不推送标签
            git_user: "IIIStudio"
            git_email: "${GIT_EMAIL}" 
            #sync_strategy: "overwrite"    # 强制覆盖，解决历史冲突
            #sync_mode: rebase
            sync_mode: "push"
            exclude_files: ".cnb.yml,*.cnb.*,.cnb/*"  # 排除多个模式