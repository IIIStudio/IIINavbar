# 启动云原生开发环境的配置（控制开发环境如何启动）
$:
  vscode:
    - docker:
        # 指定开发环境启动时的基础镜像
        image: docker.cnb.cool/iiistudio/os/docker/python:3.12.11
      services:
        - vscode  # 启用 VSCode 远程开发服务
        - docker  # 启用 dind 服务（用于构建镜像等操作）

# 构建并推送镜像的任务（原有的 push 配置保留）
main:
  push:
    - services:
        - docker
      imports:
        - https://cnb.cool/IIIStudio/key/-/blob/main/github/env.yml
      stages:
        - name: 同步到GitHub
          image: tencentcom/git-sync 
          settings:
            target_url: https://github.com/IIIStudio/IIINavbar.git
            auth_type: https
            git_user: ${GIT_USERNAME}
            git_email: ${GIT_EMAIL} 
            username: ${GIT_USERNAME} 
            password: ${GIT_ACCESS_TOKEN}
            branch: main
            sync_mode: mirror  # 镜像模式，直接覆盖
            force: true

  web_trigger:
    - runner:
        cpus: 1
      stages:
        - name: 添加 ${mc} 网站
          script: bash /workspace/update_add_collect.sh -add "${category}" "${href}" "${img}" "${mc}" "${jianjie}" ${top} ${icon}
        - name: 上传
          script: git add . ; git commit -m "添加 ${mc} 网站" ; git push
          
  web_trigger_icon:
    - runner:
        cpus: 1
      stages:
        - name: ${add-delete} ${icon} 图标
          script: sh /workspace/update_icon.sh ${add-delete} ${icon} "${image}" ${height}
        - name: 上传
          script: git add . ; git commit -m "${add-delete} ${icon} 图标" ; git push

  web_trigger_delete_url:
    - runner:
        cpus: 1
      stages:
          - name: 删除 ${url} 网站
            script: sh /workspace/web_trigger_delete_url.sh "${url}"
          - name: 上传
            script: git add . ; git commit -m "删除 ${url} 网站" ; git push